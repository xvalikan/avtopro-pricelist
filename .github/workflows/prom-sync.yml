name: Prom.ua Price Sync

on:
  schedule:
    # кожні 4 години з 6:00 до 22:00 (UTC+3 = Київ). У UTC це 3,7,11,15,19
    - cron: '0 3,7,11,15,19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install requests
      - name: Generate Prom price file
        env:
          AIRTABLE_TOKEN: ${{ secrets.AIRTABLE_TOKEN_avtopro }}
        run: python generate_prom.py
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add prom.xml
          git diff --staged --quiet || git commit -m "Update Prom price file"
          git push
